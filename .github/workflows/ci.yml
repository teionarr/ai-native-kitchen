name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: pip install -e '.[dev]'

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Validate YAML files
        run: |
          set -e
          python <<'PY'
          import sys, pathlib, yaml
          for p in pathlib.Path(".").rglob("*.y*ml"):
              if any(part in (".venv", "node_modules", ".git") for part in p.parts):
                  continue
              try:
                  yaml.safe_load(p.read_text())
                  print(f"✓ {p}")
              except Exception as e:
                  print(f"✗ {p}: {e}", file=sys.stderr)
                  sys.exit(1)
          PY

      - name: Validate JSON files
        run: |
          set -e
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*' -not -path './.venv/*'); do
            python -m json.tool "$f" > /dev/null
            echo "✓ $f"
          done

  test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -q

  schema:
    runs-on: ubuntu-latest
    name: schema
    steps:
      - uses: actions/checkout@v6

      - name: Validate config/providers.yaml has required signals (when it lands)
        run: |
          if [ -f config/providers.yaml ]; then
            python <<'PY'
          import sys, yaml
          required = {"search", "scraping", "traffic", "funding", "people", "tech"}
          providers = yaml.safe_load(open("config/providers.yaml"))
          missing = required - set(providers.keys())
          if missing:
              print(f"providers.yaml missing required signals: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"✓ providers.yaml configures all required signals")
          PY
          else
            echo "providers.yaml not yet present (lands in PR-2.3) — skipping"
          fi

  gitleaks:
    runs-on: ubuntu-latest
    name: gitleaks
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    # Builds the image, validates docker-compose.yml syntax, starts the service
    # container in isolation (no redis/postgres yet — service /health doesn't need
    # them), and asserts /health responds with the expected JSON shape. End-to-end
    # gate. Should become a required check on branch protection after this PR merges.
    runs-on: ubuntu-latest
    name: docker
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml syntax
        run: |
          # Dummy env so variable substitution works during config validation.
          REDIS_PASSWORD=ci POSTGRES_PASSWORD=ci docker compose config > /dev/null
          echo "✓ docker-compose.yml is valid"

      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-native-kitchen:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start service container
        run: |
          docker run -d \
            --name kitchen-service-ci \
            -p 8000:8000 \
            ai-native-kitchen:ci-${{ github.sha }}

      - name: Wait for /health to respond
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "✓ /health responding after ${i}s"
              echo "Response:"
              curl -s http://127.0.0.1:8000/health | python3 -m json.tool
              exit 0
            fi
            sleep 1
          done
          echo "✗ /health did not respond within 20s"
          docker logs kitchen-service-ci
          exit 1

      - name: Verify response shape
        run: |
          response=$(curl -s http://127.0.0.1:8000/health)
          echo "$response" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d.get('status') == 'ok', f'status not ok: {d}'
          assert isinstance(d.get('version'), str), f'version missing: {d}'
          assert isinstance(d.get('uptime_s'), int), f'uptime_s missing: {d}'
          print('✓ response shape valid')
          "

      - name: Container logs (always, for debugging)
        if: always()
        run: docker logs kitchen-service-ci || true

      - name: Cleanup
        if: always()
        run: docker rm -f kitchen-service-ci || true
